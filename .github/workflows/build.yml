name: Build Flemo

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Lint app metadata
        run: |
          plutil -lint Info.plist
          bash -n build-app.sh

      - name: Build debug app
        env:
          BUILD_CONFIGURATION: debug
          INSTALL_APP: "0"
          SIGN_IDENTITY: "-"
          FLEMO_DEBUG_APPCAST_URL: ${{ vars.FLEMO_DEBUG_APPCAST_URL }}
          FLEMO_DEBUG_SPARKLE_PUBLIC_KEY: ${{ secrets.FLEMO_DEBUG_SPARKLE_PUBLIC_KEY }}
        run: ./build-app.sh

      - name: Archive debug app
        run: |
          mkdir -p artifacts
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            archive_name="Flemo-Debug-${GITHUB_REF_NAME}.zip"
          else
            archive_name="Flemo-Debug-${GITHUB_SHA}.zip"
          fi
          ditto -c -k --keepParent ".build/Flemo Debug.app" "artifacts/${archive_name}"

      - name: Build release app
        env:
          BUILD_CONFIGURATION: release
          INSTALL_APP: "0"
          SIGN_IDENTITY: "-"
          FLEMO_RELEASE_APPCAST_URL: ${{ vars.FLEMO_RELEASE_APPCAST_URL }}
          FLEMO_RELEASE_SPARKLE_PUBLIC_KEY: ${{ secrets.FLEMO_RELEASE_SPARKLE_PUBLIC_KEY }}
        run: ./build-app.sh

      - name: Archive release app
        run: |
          mkdir -p artifacts
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            archive_name="Flemo-Release-${GITHUB_REF_NAME}.zip"
          else
            archive_name="Flemo-Release-${GITHUB_SHA}.zip"
          fi
          ditto -c -k --keepParent ".build/Flemo.app" "artifacts/${archive_name}"

      - name: Generate and sign appcasts
        if: github.ref_type == 'tag'
        env:
          FLEMO_RELEASE_SPARKLE_PRIVATE_KEY: ${{ secrets.FLEMO_RELEASE_SPARKLE_PRIVATE_KEY }}
          FLEMO_DEBUG_SPARKLE_PRIVATE_KEY: ${{ secrets.FLEMO_DEBUG_SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          short_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          build_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Info.plist)"
          pub_date="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          release_zip="Flemo-Release-${GITHUB_REF_NAME}.zip"
          debug_zip="Flemo-Debug-${GITHUB_REF_NAME}.zip"

          sign_update_bin="$(find .build -type f -name sign_update ! -path "*old_dsa_scripts*" 2>/dev/null | head -n1)"
          if [ -z "$sign_update_bin" ]; then
            echo "sign_update binary not found in .build" >&2
            exit 1
          fi
          chmod +x "$sign_update_bin"

          release_sig="$(printf '%s' "$FLEMO_RELEASE_SPARKLE_PRIVATE_KEY" | "$sign_update_bin" --ed-key-file - -p "artifacts/${release_zip}")"
          release_size="$(stat -f%z "artifacts/${release_zip}")"
          debug_sig="$(printf '%s' "$FLEMO_DEBUG_SPARKLE_PRIVATE_KEY" | "$sign_update_bin" --ed-key-file - -p "artifacts/${debug_zip}")"
          debug_size="$(stat -f%z "artifacts/${debug_zip}")"

          cat > artifacts/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Flemo Release Updates</title>
              <link>https://github.com/${GITHUB_REPOSITORY}/releases</link>
              <description>Release appcast for Flemo.</description>
              <item>
                <title>Flemo ${short_version}</title>
                <sparkle:version>${build_version}</sparkle:version>
                <sparkle:shortVersionString>${short_version}</sparkle:shortVersionString>
                <pubDate>${pub_date}</pubDate>
                <enclosure
                  url="${release_base}/${release_zip}"
                  sparkle:edSignature="${release_sig}"
                  length="${release_size}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

          cat > artifacts/debug-appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Flemo Debug Updates</title>
              <link>https://github.com/${GITHUB_REPOSITORY}/releases</link>
              <description>Debug appcast for Flemo.</description>
              <item>
                <title>Flemo Debug ${short_version}</title>
                <sparkle:version>${build_version}</sparkle:version>
                <sparkle:shortVersionString>${short_version}</sparkle:shortVersionString>
                <pubDate>${pub_date}</pubDate>
                <enclosure
                  url="${release_base}/${debug_zip}"
                  sparkle:edSignature="${debug_sig}"
                  length="${debug_size}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flemo-macos-apps
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          prev_tag="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
          range="${tag}"
          if [ -n "$prev_tag" ]; then range="${prev_tag}..${tag}"; fi

          changelog="$(git log "$range" --no-merges --pretty=format:"- %s — @%aN")"
          contributors="$(git log "$range" --no-merges --pretty=format:"%aN" | sort -u)"

          {
            echo "## Install"
            echo ""
            echo "Download \`Flemo-Release-${tag}.zip\`, unzip, and drag \`Flemo.app\` into **/Applications**. The app is not notarized, so clear the quarantine flag and open it:"
            echo ""
            echo '```sh'
            echo 'sudo xattr -dr com.apple.quarantine /Applications/Flemo.app'
            echo 'open /Applications/Flemo.app'
            echo '```'
            echo ""
            echo "## What's new"
            echo ""
            echo "$changelog"
            echo ""
            echo "## Contributors"
            echo ""
            echo "$contributors" | sed 's/^/- @/'
          } > release-notes.md

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
            gh release edit "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" artifacts/* \
              --title "Flemo ${tag}" \
              --notes-file release-notes.md
          fi

      - name: Publish appcasts to repo root (GitHub Pages)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin main
          git checkout -B main origin/main
          cp artifacts/appcast.xml ./appcast.xml
          cp artifacts/debug-appcast.xml ./debug-appcast.xml
          git add appcast.xml debug-appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
          else
            git commit -m "chore(appcast): publish feeds for ${GITHUB_REF_NAME} [skip ci]"
            git push origin main
          fi
